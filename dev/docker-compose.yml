services:
  jellyfin:
    image: ${JELLYFIN_IMAGE:-jellyfin/jellyfin:latest}
    container_name: jellyfin-uploadinbox-dev
    ports:
      - "${JELLYFIN_HTTP_PORT:-8096}:8096"
    volumes:
      # Jellyfin persists configuration and plugins under /config in the container.
      - ./jf-config:/config
      - ./jf-cache:/cache

      # Upload destination used by this plugin in local dev
      - ./inbox:/inbox
    restart: unless-stopped
