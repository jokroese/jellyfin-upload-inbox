<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Upload Inbox Configuration</title>
</head>
<body>
    <style>
        .uploadInboxConfigPage .uploadTargetRow {
            padding: 0.75em 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        @media (min-width: 900px) {
            .uploadInboxConfigPage .uploadTargetFields {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.75em 1.25em;
                align-items: start;
            }

            .uploadInboxConfigPage .uploadTargetActions {
                margin-top: 0.5em;
            }
        }
    </style>

    <div id="UploadInboxConfigPage"
         data-role="page"
         class="page type-interior pluginConfigurationPage uploadInboxConfigPage"
         data-controller="__plugin/UploadInbox/config.js"
         data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <form id="UploadInboxConfigForm" class="uploadInboxConfigForm">
                    <h1>Upload Inbox</h1>
                    <p>Configure upload targets.</p>
                    <div class="uploadInboxConfigGuidance" style="margin-bottom: 1em; padding: 0.75em; background: rgba(255,255,255,0.06); border-radius: 4px;">
                        <strong>Path and permissions:</strong> Base path must be an absolute path on the server. The Jellyfin process must have write access to that directory. Docker users: use a path visible inside the container (e.g. <code>/inbox</code>), not a host-only path.
                    </div>

                    <div class="sectionTitleContainer">
                        <h2>Targets</h2>
                    </div>
                    <div class="uploadTargetsContainer"></div>

                    <button is="emby-button" type="button" class="raised button-addTarget emby-button">
                        <span>Add Target</span>
                    </button>

                    <div class="sectionTitleContainer">
                        <h2>Save</h2>
                    </div>
                    <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                        <span>Save</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
