<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Upload Inbox</title>
</head>
<body>
    <div id="UploadInboxPage"
         data-role="page"
         class="page type-interior uploadInboxPage"
         data-controller="__plugin/UploadInbox/upload.js"
         data-require="emby-input,emby-select,emby-button">
        <div data-role="content">
            <div class="content-primary">
                <h1>Upload Inbox</h1>
                <p>Select a target and upload files to the server inbox.</p>

                <div class="inputContainer">
                    <label for="selectTarget">Target</label>
                    <select is="emby-select" id="selectTarget" class="selectTarget"></select>
                </div>

                <div class="inputContainer">
                    <label>Files</label>
                    <input is="emby-input" type="file" id="fileInput" multiple />
                </div>

                <div class="uploadDropZone">
                    Drag and drop files here
                </div>

                <div class="uploadQueue"></div>
            </div>
        </div>
    </div>

    <style>
        .uploadDropZone {
            border: 2px dashed #888;
            border-radius: 4px;
            padding: 1.5em;
            text-align: center;
            margin-top: 1em;
        }

        .uploadDropZone.dragover {
            border-color: #00a4dc;
            background-color: rgba(0, 164, 220, 0.1);
        }

        .uploadItem {
            margin-top: 1em;
        }

        .uploadProgressBar {
            width: 100%;
            height: 6px;
            background-color: #444;
            border-radius: 3px;
            overflow: hidden;
        }

        .uploadProgressBarInner {
            height: 100%;
            width: 0;
            background-color: #00a4dc;
        }
    </style>

</body>
</html>
