# Release on version tags (v*). Builds plugin, runs tests, creates a GitHub
# Release, generates a modern Jellyfin repository manifest, and publishes it to GitHub Pages.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp build.yaml version
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.version.outputs.version }}\"/" build.yaml

      - name: Install .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-9-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-9-

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: >
          dotnet build --no-restore -c Release
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.version }}
          -p:FileVersion=${{ steps.version.outputs.version }}

      - name: Run unit tests
        run: >
          dotnet test
          Jellyfin.Plugin.UploadInbox.Tests/Jellyfin.Plugin.UploadInbox.Tests.csproj
          --no-build -c Release

      - name: Publish plugin
        run: >
          dotnet publish
          Jellyfin.Plugin.UploadInbox/Jellyfin.Plugin.UploadInbox.csproj
          -c Release --no-build
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.version }}
          -p:FileVersion=${{ steps.version.outputs.version }}

      - name: Run integration tests
        run: >
          dotnet test
          Jellyfin.Plugin.UploadInbox.IntegrationTests/Jellyfin.Plugin.UploadInbox.IntegrationTests.csproj
          -c Release
        timeout-minutes: 20

      - name: Package release ZIP and SHA-256
        run: |
          VERSION="${{ steps.version.outputs.version }}" ./scripts/package-release.sh

      - name: Generate MD5 for manifest
        run: |
          cd dist
          ZIP="UploadInbox_${{ steps.version.outputs.version }}.zip"
          md5sum "$ZIP" | awk '{ print $1 }' > "${ZIP}.md5"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Upload Inbox ${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            dist/UploadInbox_${{ steps.version.outputs.version }}.zip
            dist/UploadInbox_${{ steps.version.outputs.version }}.zip.sha256
            dist/UploadInbox_${{ steps.version.outputs.version }}.zip.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python dependencies for manifest
        run: python -m pip install pyyaml

      - name: Build Jellyfin repository manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p pages
          bash scripts/generate-manifest.sh

      - name: Validate generated manifest JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("pages/manifest.json").read_text(encoding="utf-8"))
          assert isinstance(manifest, list) and manifest, "Manifest must be a non-empty list"

          plugin = manifest[0]
          for key in ["guid", "name", "description", "overview", "category", "owner", "versions"]:
              assert key in plugin, f"Missing top-level key: {key}"

          versions = plugin["versions"]
          assert isinstance(versions, list) and versions, "versions must be a non-empty list"

          version = versions[0]
          for key in ["version", "targetAbi", "sourceUrl", "checksum", "timestamp"]:
              assert key in version, f"Missing version key: {key}"
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy-pages:
    name: Deploy manifest to Pages
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
