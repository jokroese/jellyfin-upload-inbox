# Release on version tags (v*). Builds plugin, runs unit + integration tests,
# creates GitHub Release with ZIP/checksums, generates manifest.json, and
# deploys it to GitHub Pages via Actions.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp build.yaml version
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.version.outputs.version }}\"/" build.yaml

      - name: Install .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-9-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-9-

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: >
          dotnet build --no-restore -c Release
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.version }}
          -p:FileVersion=${{ steps.version.outputs.version }}

      - name: Run unit tests
        run: >
          dotnet test
          Jellyfin.Plugin.UploadInbox.Tests/Jellyfin.Plugin.UploadInbox.Tests.csproj
          --no-build -c Release

      - name: Publish plugin
        run: >
          dotnet publish
          Jellyfin.Plugin.UploadInbox/Jellyfin.Plugin.UploadInbox.csproj
          -c Release --no-build
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.version }}
          -p:FileVersion=${{ steps.version.outputs.version }}

      - name: Run integration tests
        run: >
          dotnet test
          Jellyfin.Plugin.UploadInbox.IntegrationTests/Jellyfin.Plugin.UploadInbox.IntegrationTests.csproj
          -c Release
        timeout-minutes: 20

      - name: Package release ZIP and SHA-256
        run: |
          VERSION="${{ steps.version.outputs.version }}" ./scripts/package-release.sh

      - name: Generate MD5 for manifest
        run: |
          cd dist
          ZIP="UploadInbox_${{ steps.version.outputs.version }}.zip"
          md5sum "$ZIP" | awk '{ print $1 }' > "${ZIP}.md5"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Upload Inbox ${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            dist/UploadInbox_${{ steps.version.outputs.version }}.zip
            dist/UploadInbox_${{ steps.version.outputs.version }}.zip.sha256
            dist/UploadInbox_${{ steps.version.outputs.version }}.zip.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Pages payload
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p pages
          ZIP="UploadInbox_${VERSION}.zip"
          MD5="$(cat dist/${ZIP}.md5)"
          cat > pages/manifest.json <<EOF
          [
            {
              "name": "Upload Inbox",
              "guid": "b3ff3bcd-9b77-4a5e-9c22-3c5236757d12",
              "version": "${VERSION}",
              "targetAbi": "10.11.0.0",
              "framework": "net9.0",
              "overview": "Upload files directly to a configured server inbox from Jellyfin.",
              "description": "Adds an Upload Inbox page to Jellyfin so authenticated users can upload files into configured folders on the server, with per-target permissions, extension allowlists, file size limits, and resumable chunked uploads.",
              "category": "General",
              "owner": "jokroese",
              "artifacts": [
                {
                  "url": "https://github.com/${REPO}/releases/download/v${VERSION}/${ZIP}",
                  "checksum": "${MD5}",
                  "checksumType": "md5"
                }
              ]
            }
          ]
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy-pages:
    name: Deploy manifest to Pages
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
